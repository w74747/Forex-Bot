<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Forex Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a1a; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 8px; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 24px; font-weight: bold; margin-top: 10px; }
        .stat-value.positive { color: #10b981; }
        .stat-value.negative { color: #ef4444; }
        table { width: 100%; background: #2a2a2a; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th { background: #333; padding: 12px; text-align: left; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #444; }
        tr:hover { background: #383838; }
        .pagination { text-align: center; padding: 20px; }
        .pagination button { margin: 0 5px; padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { background: #5568d3; }
        .pagination button.active { background: #10b981; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Forex Trading Dashboard</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Starting Balance</div>
                <div class="stat-value">$200.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Current Balance</div>
                <div class="stat-value" id="curr-balance">$200.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total P&L</div>
                <div class="stat-value" id="total-pnl">$0.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="win-rate">0%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value" id="total-trades">0</div>
            </div>
        </div>
        
        <h2>📈 Closed Trades</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Symbol</th>
                    <th>Direction</th>
                    <th>Entry Price</th>
                    <th>Exit Price</th>
                    <th>P&L</th>
                    <th>Strategy</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="trades">
                <tr><td colspan="8" class="loading">Loading...</td></tr>
            </tbody>
        </table>
        
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        async function loadData(page = 1) {
            try {
                // Load stats
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                
                document.getElementById('curr-balance').innerText = '$' + (stats.current_balance || 200).toFixed(2);
                document.getElementById('total-pnl').innerText = '$' + (stats.total_pnl || 0).toFixed(2);
                document.getElementById('total-pnl').className = 'stat-value ' + ((stats.total_pnl || 0) >= 0 ? 'positive' : 'negative');
                document.getElementById('win-rate').innerText = (stats.win_rate || 0).toFixed(1) + '%';
                document.getElementById('total-trades').innerText = stats.total_trades || 0;
                
                // Load trades
                const tradesRes = await fetch('/api/trades?page=' + page);
                const data = await tradesRes.json();
                
                if (!data.trades || data.trades.length === 0) {
                    document.getElementById('trades').innerHTML = '<tr><td colspan="8" class="loading">No trades yet</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                
                document.getElementById('trades').innerHTML = data.trades.map(t => `
                    <tr>
                        <td>${t.id}</td>
                        <td><strong>${t.symbol}</strong></td>
                        <td style="color: ${t.direction === 'BUY' ? '#10b981' : '#ef4444'}; font-weight: bold;">${t.direction}</td>
                        <td>${t.entry_price.toFixed(5)}</td>
                        <td>${t.exit_price.toFixed(5)}</td>
                        <td style="color: ${t.net_pnl >= 0 ? '#10b981' : '#ef4444'}; font-weight: bold;">
                            ${t.net_pnl >= 0 ? '+' : ''}$${t.net_pnl.toFixed(2)}
                        </td>
                        <td>${t.strategy}</td>
                        <td>${t.closed_at}</td>
                    </tr>
                `).join('');
                
                // Pagination
                let pag = '';
                if (data.page > 1) pag += `<button onclick="loadData(1)">First</button><button onclick="loadData(${data.page - 1})">Prev</button>`;
                for (let i = Math.max(1, data.page - 2); i <= Math.min(data.total_pages, data.page + 2); i++) {
                    pag += `<button ${i === data.page ? 'class="active"' : ''} onclick="loadData(${i})">${i}</button>`;
                }
                if (data.page < data.total_pages) pag += `<button onclick="loadData(${data.page + 1})">Next</button><button onclick="loadData(${data.total_pages})">Last</button>`;
                document.getElementById('pagination').innerHTML = pag;
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        loadData(1);
        setInterval(() => loadData(1), 10000);
    </script>
</body>
</html>
