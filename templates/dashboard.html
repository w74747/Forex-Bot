<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Trading Bot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333;}
        .container {max-width: 1600px; margin: 0 auto;}
        .header {background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;}
        .header h1 {color: #667eea; font-size: 28px;}
        .status-badge {display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; background: #10b981; color: white;}
        .stats-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;}
        .stat-card {background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #667eea; transition: transform 0.3s, box-shadow 0.3s;}
        .stat-card:hover {transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15);}
        .stat-card.green {border-left-color: #10b981;}
        .stat-card.red {border-left-color: #ef4444;}
        .stat-card.blue {border-left-color: #3b82f6;}
        .stat-label {font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;}
        .stat-value {font-size: 32px; font-weight: bold; color: #333;}
        .stat-value.green {color: #10b981;}
        .stat-value.red {color: #ef4444;}
        .tabs {display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; background: white; padding: 0 30px; border-radius: 12px 12px 0 0;}
        .tab-button {padding: 15px 25px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: 600; color: #999; border-bottom: 3px solid transparent; transition: all 0.3s;}
        .tab-button.active {color: #667eea; border-bottom-color: #667eea;}
        .tab-button:hover {color: #667eea;}
        .tab-content {display: none; background: white; padding: 30px; border-radius: 0 12px 12px 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        .tab-content.active {display: block;}
        .filters {display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 20px; background: #f9fafb; border-radius: 8px;}
        .filter-group {display: flex; flex-direction: column;}
        .filter-group label {font-size: 13px; font-weight: 600; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .filter-group input, .filter-group select {padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color 0.3s;}
        .filter-group input:focus, .filter-group select:focus {outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);}
        button {padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;}
        .btn-primary {background: #667eea; color: white;}
        .btn-primary:hover {background: #5568d3; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);}
        .btn-secondary {background: #10b981; color: white;}
        .btn-secondary:hover {background: #059669;}
        .table-container {overflow-x: auto; margin-top: 20px;}
        table {width: 100%; border-collapse: collapse; font-size: 13px;}
        thead {background: #f3f4f6;}
        th {padding: 15px; text-align: right; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb;}
        td {padding: 15px; border-bottom: 1px solid #e5e7eb;}
        tr:hover {background: #f9fafb;}
        .profit {color: #10b981; font-weight: 600;}
        .loss {color: #ef4444; font-weight: 600;}
        .neutral {color: #6b7280;}
        .chart-container {position: relative; height: 300px; margin: 20px 0; background: #f9fafb; padding: 20px; border-radius: 8px;}
        .loading {display: flex; justify-content: center; align-items: center; height: 200px;}
        .spinner {border: 4px solid #f3f4f6; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;}
        @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}
        .badge {display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;}
        .badge-open {background: #dbeafe; color: #1e40af;}
        .badge-closed {background: #d1d5db; color: #374151;}
        .badge-buy {background: #dcfce7; color: #166534;}
        .badge-sell {background: #fee2e2; color: #991b1b;}
        @media (max-width: 768px) {.header {flex-direction: column;} .filters {grid-template-columns: 1fr;} .stats-grid {grid-template-columns: 1fr;} .tabs {padding: 0 15px;} .tab-content {padding: 15px;} table {font-size: 12px;} th, td {padding: 10px;}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Dashboard</h1>
                <p style="color: #999; margin-top: 5px;">Trading Bot</p>
            </div>
            <div>
                <span class="status-badge" id="statusBadge">🟢 Online</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value" id="totalTrades">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">Winning</div>
                <div class="stat-value green" id="winningTrades">0</div>
            </div>
            <div class="stat-card red">
                <div class="stat-label">Losing</div>
                <div class="stat-value red" id="losingTrades">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="winRate">0%</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">Total PnL</div>
                <div class="stat-value green" id="totalPnl">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Open Positions</div>
                <div class="stat-value" id="openPositions">0</div>
            </div>
        </div>

        <div style="background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 20px; color: #333;">📈 Equity Curve (7 Days)</h2>
            <div class="chart-container">
                <canvas id="equityChart"></canvas>
            </div>
        </div>

        <div style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
            <div class="tabs">
                <button class="tab-button active" data-tab="trades">📊 Trades</button>
                <button class="tab-button" data-tab="logs">📝 Logs</button>
            </div>

            <div class="tab-content active" id="trades-tab">
                <h2 style="margin-bottom: 20px; color: #333;">Filter Trades</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filterStatus">
                            <option value="">All</option>
                            <option value="OPEN">Open</option>
                            <option value="CLOSED">Closed</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Symbol</label>
                        <select id="filterSymbol">
                            <option value="">All</option>
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="USDJPY">USDJPY</option>
                            <option value="AUDUSD">AUDUSD</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>From Date</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    <div class="filter-group">
                        <label>To Date</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    <div class="filter-group" style="display: flex; align-items: flex-end;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-primary" onclick="loadTrades()">🔍 Search</button>
                            <button class="btn-secondary" onclick="exportTrades()">📥 Excel</button>
                        </div>
                    </div>
                </div>
                <div id="tradesContainer" class="loading"><div class="spinner"></div></div>
            </div>

            <div class="tab-content" id="logs-tab">
                <h2 style="margin-bottom: 20px; color: #333;">Filter Logs</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label>Log Type</label>
                        <select id="filterLogType">
                            <option value="">All</option>
                            <option value="SYSTEM_START">System Start</option>
                            <option value="TRADE_OPEN">Trade Open</option>
                            <option value="TRADE_CLOSE">Trade Close</option>
                            <option value="ERROR">Error</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>From Date</label>
                        <input type="date" id="filterLogStartDate">
                    </div>
                    <div class="filter-group">
                        <label>To Date</label>
                        <input type="date" id="filterLogEndDate">
                    </div>
                    <div class="filter-group" style="display: flex; align-items: flex-end;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-primary" onclick="loadLogs()">🔍 Search</button>
                            <button class="btn-secondary" onclick="exportLogs()">📥 Excel</button>
                        </div>
                    </div>
                </div>
                <div id="logsContainer" class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <script>
        let equityChart = null;

        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                const stats = await response.json();
                document.getElementById('totalTrades').textContent = stats.total_trades || 0;
                document.getElementById('winningTrades').textContent = stats.winning_trades || 0;
                document.getElementById('losingTrades').textContent = stats.losing_trades || 0;
                document.getElementById('winRate').textContent = (stats.win_rate || 0) + '%';
                document.getElementById('totalPnl').textContent = '$' + (stats.total_pnl || 0).toFixed(2);
                document.getElementById('openPositions').textContent = stats.open_positions || 0;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadEquityChart() {
            try {
                const response = await fetch('/api/equity-curve?days=7');
                const data = await response.json();
                const ctx = document.getElementById('equityChart').getContext('2d');
                if (equityChart) equityChart.destroy();
                equityChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.trade_date || 'N/A'),
                        datasets: [{
                            label: 'Cumulative PnL',
                            data: data.map(d => d.cumulative_pnl || 0),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 5,
                            pointBackgroundColor: '#667eea',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {legend: {display: true, position: 'top'}},
                        scales: {y: {beginAtZero: true, ticks: {callback: function(value) {return '$' + value.toFixed(2);}}}}
                    }
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadTrades() {
            const status = document.getElementById('filterStatus').value;
            const symbol = document.getElementById('filterSymbol').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (symbol) params.append('symbol', symbol);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            
            try {
                const response = await fetch(`/api/trades?${params}`);
                const trades = await response.json();
                let html = '<div class="table-container"><table><thead><tr><th>ID</th><th>Symbol</th><th>Direction</th><th>Entry</th><th>Exit</th><th>Status</th><th>PnL</th></tr></thead><tbody>';
                if (trades.length === 0) {
                    html += '<tr><td colspan="7" style="text-align: center; color: #999;">No data</td></tr>';
                } else {
                    trades.forEach(trade => {
                        const pnlClass = trade.net_pnl > 0 ? 'profit' : trade.net_pnl < 0 ? 'loss' : 'neutral';
                        html += `<tr><td>${trade.id}</td><td><strong>${trade.symbol}</strong></td><td><span class="badge ${trade.direction === 'BUY' ? 'badge-buy' : 'badge-sell'}">${trade.direction}</span></td><td>${parseFloat(trade.entry_price).toFixed(5)}</td><td>${trade.exit_price ? parseFloat(trade.exit_price).toFixed(5) : '-'}</td><td><span class="badge ${trade.status === 'OPEN' ? 'badge-open' : 'badge-closed'}">${trade.status}</span></td><td class="${pnlClass}">$${parseFloat(trade.net_pnl || 0).toFixed(2)}</td></tr>`;
                    });
                }
                html += '</tbody></table></div>';
                document.getElementById('tradesContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('tradesContainer').innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }

        async function loadLogs() {
            const logType = document.getElementById('filterLogType').value;
            const startDate = document.getElementById('filterLogStartDate').value;
            const endDate = document.getElementById('filterLogEndDate').value;
            const params = new URLSearchParams();
            if (logType) params.append('log_type', logType);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            
            try {
                const response = await fetch(`/api/logs?${params}`);
                const logs = await response.json();
                let html = '<div class="table-container"><table><thead><tr><th>ID</th><th>Type</th><th>Message</th><th>Time</th></tr></thead><tbody>';
                if (logs.length === 0) {
                    html += '<tr><td colspan="4" style="text-align: center; color: #999;">No data</td></tr>';
                } else {
                    logs.forEach(log => {
                        const timestamp = new Date(log.created_at).toLocaleString();
                        html += `<tr><td>${log.id}</td><td><strong>${log.log_type}</strong></td><td>${log.message}</td><td>${timestamp}</td></tr>`;
                    });
                }
                html += '</tbody></table></div>';
                document.getElementById('logsContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('logsContainer').innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }

        function exportTrades() {
            const status = document.getElementById('filterStatus').value;
            const symbol = document.getElementById('filterSymbol').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (symbol) params.append('symbol', symbol);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            window.location.href = `/api/export/trades?${params}`;
        }

        function exportLogs() {
            const logType = document.getElementById('filterLogType').value;
            const startDate = document.getElementById('filterLogStartDate').value;
            const endDate = document.getElementById('filterLogEndDate').value;
            const params = new URLSearchParams();
            if (logType) params.append('log_type', logType);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            window.location.href = `/api/export/logs?${params}`;
        }

        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.dataset.tab;
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                button.classList.add('active');
                document.getElementById(tabName + '-tab').classList.add('active');
                if (tabName === 'trades') loadTrades();
                else if (tabName === 'logs') loadLogs();
            });
        });

        setInterval(() => {loadStatistics(); loadEquityChart();}, 30000);
        window.addEventListener('load', () => {loadStatistics(); loadEquityChart(); loadTrades();});
    </script>
</body>
</html>
